pump_on:
  name: Pumpe einschalten
  description: Schaltet die Pumpe über MQTT ein.

pump_off:
  name: Pumpe ausschalten
  description: Schaltet die Pumpe über MQTT aus.

pump_run:
  name: Pumpe für Zeit laufen lassen
  description: Lässt die Pumpe über MQTT für eine bestimmte Anzahl Sekunden laufen.
  fields:
    seconds:
      name: Sekunden
      description: Laufzeit der Pumpe in Sekunden.
      required: true
      example: 10
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: s
          mode: box

auto_on:
  name: Automatik einschalten
  description: Schaltet die automatische Bewässerung über MQTT ein.

auto_off:
  name: Automatik ausschalten
  description: Schaltet die automatische Bewässerung über MQTT aus.

emergency_stop:
  name: Not-Aus
  description: Sendet STOP an den ESP32.

rediscovery:
  name: MQTT Discovery neu senden
  description: Fordert den ESP32 auf, Home-Assistant-MQTT-Discovery erneut zu senden.

set_mqtt_interval:
  name: MQTT Updateintervall setzen
  description: Setzt das MQTT-Publish-Intervall des ESP32 in Sekunden.
  fields:
    seconds:
      name: Sekunden
      description: Neues MQTT-Updateintervall. Minimum 5 Sekunden.
      required: true
      example: 60
      selector:
        number:
          min: 5
          max: 3600
          unit_of_measurement: s
          mode: box
